site_name: Content Services for Spring
theme: bootstrap4
nav:
  - Home: index.md
  - Guides:
    - Java API: spring-content-fs-docs.md
    - REST API: spring-content-rest-docs.md
    - Renditions: spring-content-with-renditions-docs.md
    - Metadata Extraction: spring-content-metadata-extraction-docs.md
    - Fulltext: spring-content-with-fulltext-docs.md
    - Versions: spring-content-with-versions-docs.md
    - RBAC: spring-content-with-rbac-docs.md
    - CMIS: spring-content-with-cmis-docs.md
    - Encryption: spring-content-with-encryption-docs.md
plugins:
  - search
  - git-committers:
      repository: intesys/spring-content
      branch: main
  - macros
extra:
  spring_content_ga_version: !ENV [ SPRING_CONTENT_GA_VERSION, "UNKNOWN" ]
  spring_content_snapshot_version: !ENV [ SPRING_CONTENT_SNAPSHOT_VERSION, "UNKNOWN" ]
use_directory_urls: false
